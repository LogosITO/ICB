name: Docs

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Build documentation
        run: cargo doc --workspace --exclude icb-clang --no-deps

      - name: Generate root index.html
        run: |
          echo "<html><body><h1>ICB Documentation</h1><ul>" > target/doc/index.html
          for dir in target/doc/*/; do
            name=$(basename "$dir")
            if [ "$name" != "src" ]; then
              echo "<li><a href='${name}/index.html'>${name}</a></li>" >> target/doc/index.html
            fi
          done
          echo "</ul></body></html>" >> target/doc/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/doc
          destination_dir: ${{ github.ref_name }}