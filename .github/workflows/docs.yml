name: Docs
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install LLVM and Clang libraries
        run: |
          sudo apt-get update -y
          sudo apt-get install -y llvm-dev libclang-dev libclang-cpp-dev clang
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> $GITHUB_ENV

      - name: Build documentation (cargo doc)
        run: cargo doc --workspace --no-deps --document-private-items

      - name: Prepare deployment directory
        run: |
          mv target/doc public

          cp docs/index.html public/
          cp docs/benchmarks.html public/

          if [ -d docs/bench-data ]; then
            mkdir -p public/bench-data
            cp -r docs/bench-data/* public/bench-data/
          fi

          echo "Deployment directory ready."

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4