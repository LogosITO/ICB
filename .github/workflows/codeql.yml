name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 12 * * 1'

jobs:
  analyze:
    name: Analyze (Rust + JavaScript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: ['rust', 'javascript']

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Install LLVM and Clang (for Rust crates depending on clang-sys)
        if: matrix.language == 'rust'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y llvm-dev libclang-dev libclang-cpp-dev clang
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> $GITHUB_ENV

      - name: Autobuild (for Rust) / Manual build (for JavaScript)
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3