name: Benchmarks

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'crates/icb-clang/**'
      - 'crates/icb-graph/**'
      - 'crates/icb-parser/**'
      - 'benches/**'
      - 'scripts/generate-bench-json/**'
      - '.github/workflows/benchmarks.yml'

jobs:
  bench-clang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install LLVM and Clang libraries
        run: |
          sudo apt-get update -y
          sudo apt-get install -y llvm-dev libclang-dev libclang-cpp-dev clang
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> $GITHUB_ENV
      - name: Run Clang benchmarks
        run: |
          cargo bench -p icb-clang-benchmarks           \
            --bench single_large_file                   \
            --bench deeply_nested                       \
            --bench many_calls                          \
            --bench system_headers                      \
            -- --output-format bencher | tee bench_clang.txt
      - uses: actions/upload-artifact@v4
        with:
          name: bench-clang
          path: bench_clang.txt

  bench-graph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Run Graph benchmarks
        run: |
          cargo bench -p icb-graph-benchmarks           \
            --bench build_graph                         \
            --bench resolve_calls                       \
            --bench full_analysis                       \
            -- --output-format bencher | tee bench_graph.txt
      - uses: actions/upload-artifact@v4
        with:
          name: bench-graph
          path: bench_graph.txt

  bench-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install LLVM and Clang libraries
        run: |
          sudo apt-get update -y
          sudo apt-get install -y llvm-dev libclang-dev libclang-cpp-dev clang
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> $GITHUB_ENV
      - name: Run Server benchmarks
        run: |
          cargo bench -p icb-server-benchmarks          \
            --bench analytics_metrics                   \
            --bench graph_serialization                 \
            --bench graph_subgraph                      \
            -- --output-format bencher | tee bench_server.txt
      - uses: actions/upload-artifact@v4
        with:
          name: bench-server
          path: bench_server.txt

  bench-parser-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Run tree‑sitter benchmarks
        run: |
          cargo bench -p icb-parser-benchmarks -- --output-format bencher | tee bench_ts.txt
      - uses: actions/upload-artifact@v4
        with:
          name: bench-ts
          path: bench_ts.txt

  publish-results:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [bench-clang, bench-graph, bench-server, bench-parser-ts]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Generate latest.json
        run: |
          mkdir -p docs/bench-data
          cargo run -p generate-bench-json -- \
            artifacts/bench-clang/bench_clang.txt \
            artifacts/bench-graph/bench_graph.txt \
            artifacts/bench-server/bench_server.txt \
            artifacts/bench-ts/bench_ts.txt \
            > docs/bench-data/latest.json
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/bench-data/latest.json
          if git diff-index --quiet HEAD --; then
            echo "No changes";
          else
            git commit -m "bench: update latest.json"
            git push
          fi