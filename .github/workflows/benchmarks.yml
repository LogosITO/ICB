name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  bench:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      # 🔥 CRITICAL FIX: ensure benches actually run
      - name: Run benchmarks
        run: cargo bench --workspace --all-features

      - name: Generate JSON
        run: |
          mkdir -p docs/bench-data
          cargo run -p generate-bench-json > docs/bench-data/latest.json

      - name: Load baseline
        run: |
          if [ ! -f docs/bench-data/baseline.json ]; then
            cp docs/bench-data/latest.json docs/bench-data/baseline.json
          fi

      - name: Regression check
        run: cargo run -p benchmark-regression-check

      - name: Commit results
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name github-actions
          git config user.email actions@github.com

          git add docs/bench-data

          git diff --cached --quiet || git commit -m "bench: update baseline"
          git push