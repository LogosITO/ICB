name: Benchmarks

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates/icb-clang/**'
      - 'crates/icb-graph/**'
      - 'crates/icb-parser/**'
      - 'benches/**'
      - '.github/workflows/benchmarks.yml'
  pull_request:
    branches: [main]
    paths:
      - 'crates/icb-clang/**'
      - 'crates/icb-graph/**'
      - 'crates/icb-parser/**'
      - 'benches/**'
      - '.github/workflows/benchmarks.yml'

jobs:
  bench-clang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install LLVM
        run: |
          sudo apt-get update -y
          sudo apt-get install -y llvm-dev libclang-dev
      - name: Run Clang benchmarks
        run: |
          cargo bench -p icb-clang-benchmarks           \
            --bench single_large_file                   \
            --bench deeply_nested                       \
            --bench many_calls                          \
            --bench system_headers                      \
            -- --output-format bencher | tee bench_clang.txt
      - uses: actions/upload-artifact@v4
        with:
          name: bench-clang
          path: bench_clang.txt

  bench-graph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install LLVM
        run: |
          sudo apt-get update -y
          sudo apt-get install -y llvm-dev libclang-dev
      - name: Run Graph benchmarks
        run: |
          cargo bench -p icb-graph-benchmarks           \
            --bench build_graph                         \
            --bench resolve_calls                       \
            --bench full_analysis                       \
            -- --output-format bencher | tee bench_graph.txt
      - uses: actions/upload-artifact@v4
        with:
          name: bench-graph
          path: bench_graph.txt

  bench-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Run Server benchmarks
        run: |
          cargo bench -p icb-server-benchmarks          \
            --bench analytics_metrics                   \
            --bench graph_serialization                 \
            --bench graph_subgraph                      \
            -- --output-format bencher | tee bench_server.txt
      - uses: actions/upload-artifact@v4
        with:
          name: bench-server
          path: bench_server.txt

  bench-parser-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Run tree‑sitter benchmarks
        run: |
          cargo bench -p icb-parser-benchmarks          \
            --bench single_large_file                   \
            --bench deeply_nested                       \
            --bench many_calls                          \
            -- --output-format bencher | tee bench_ts.txt
      - uses: actions/upload-artifact@v4
        with:
          name: bench-ts
          path: bench_ts.txt