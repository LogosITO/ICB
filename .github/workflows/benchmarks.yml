name: Benchmarks

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates/icb-clang/**'
      - 'crates/icb-graph/**'
      - 'crates/icb-parser/**'
      - 'benches/**'
      - '.github/workflows/benchmarks.yml'
  pull_request:
    branches: [main]
    paths:
      - 'crates/icb-clang/**'
      - 'crates/icb-graph/**'
      - 'crates/icb-parser/**'
      - 'benches/**'
      - '.github/workflows/benchmarks.yml'

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install LLVM
        run: |
          sudo apt-get update -y
          sudo apt-get install -y llvm-dev libclang-dev

      - name: Install critcmp
        uses: taiki-e/install-action@v2
        with:
          tool: critcmp

      - name: Run synthetic benchmarks
        run: |
          cargo bench --workspace           \
            --bench single_large_file       \
            --bench deeply_nested           \
            --bench many_calls              \
            --bench system_headers           \
            --bench build_graph             \
            --bench resolve_calls           \
            --bench full_analysis           \
            --bench analytics_metrics       \
            --bench graph_serialization     \
            --bench graph_subgraph           \
            --bench single_large_file_ts    \
            --bench deeply_nested_ts         \
            --bench many_calls_ts            \
            -- --output-format bencher | tee bench_output.txt

      - name: Store results
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks
          path: bench_output.txt