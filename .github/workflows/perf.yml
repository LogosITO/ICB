name: LLVM Performance Gate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  perf:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      # 🔥 FIX clang-sys
      - name: Install LLVM + libclang
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm clang libclang-dev

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=/usr/lib/llvm-14/lib" >> $GITHUB_ENV

      - name: Run benchmarks (Criterion)
        run: cargo bench --workspace --all-features

      - name: Generate latest.json
        run: |
          mkdir -p docs/bench-data
          cargo run -p generate-bench-json -- target/criterion > docs/bench-data/latest.json

      - name: Ensure baseline exists
        run: |
          if [ ! -f docs/bench-data/baseline.json ]; then
            cp docs/bench-data/latest.json docs/bench-data/baseline.json
          fi

      - name: Regression check
        run: cargo run -p perf-engine

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: perf-report
          path: docs/bench-data

      - name: Commit baseline (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name github-actions
          git config user.email actions@github.com

          git add docs/bench-data

          git diff --cached --quiet || git commit -m "bench: update baseline"
          git push