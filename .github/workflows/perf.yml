name: Performance Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  perf:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Run benchmarks
        run: cargo bench -- --nocapture | tee bench.txt

      - name: Generate perf JSON
        run: |
          mkdir -p docs/bench-data
          cargo run -p generate-bench-json -- bench.txt > docs/bench-data/latest.json

      - name: Ensure baseline exists
        run: |
          if [ ! -f docs/bench-data/baseline.json ]; then
            cp docs/bench-data/latest.json docs/bench-data/baseline.json
          fi

      - name: LLVM-level regression check
        run: cargo run -p perf-engine

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: perf-report
          path: docs/bench-data