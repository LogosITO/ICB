<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICB – Infinite Code Blueprint</title>
    <style>
        :root {
            --bg: #111; --surface: #1a1a1a; --text: #ccc; --accent: #b0b0b0;
            --border: #333; --hover: #222; --header: #888;
            --mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            --radius: 6px;
        }
        body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); }
        header { padding: 2rem; border-bottom: 1px solid var(--border); text-align: center; }
        h1 { font-size: 2rem; color: var(--accent); }
        .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
        .card {
            background: var(--surface); border: 1px solid var(--border);
            padding: 1.5rem; margin: 1rem 0; border-radius: var(--radius);
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        .card h2 { margin-top: 0; color: var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        table { width: 100%; border-collapse: collapse; margin: 0.5rem 0; }
        th, td { padding: 0.4rem 0.8rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        th { color: var(--header); font-weight: 500; text-align: left; }
        tbody tr:nth-child(even) { background: rgba(255,255,255,0.03); }
        tbody tr:hover { background: var(--hover); }
        .time {
            font-family: var(--mono); text-align: right; white-space: nowrap;
            width: 120px; color: var(--accent);
        }
        .error { color: #c44; font-size: 0.9rem; margin-top: 0.5rem; }
    </style>
</head>
<body>
<header>
    <h1>ICB</h1>
    <p>Infinite Code Blueprint – multi‑language call graph analysis toolkit</p>
</header>
<div class="container">
    <div class="card">
        <h2>Documentation</h2>
        <div class="grid">
            <a href="./icb_common/index.html">icb‑common</a>
            <a href="./icb_parser/index.html">icb‑parser</a>
            <a href="./icb_clang/index.html">icb‑clang</a>
            <a href="./icb_graph/index.html">icb‑graph</a>
            <a href="./icb_cli/index.html">icb‑cli</a>
            <a href="./icb_server/index.html">icb‑server</a>
            <a href="./icb_report/index.html">icb‑report</a>
        </div>
    </div>

    <div class="card">
        <h2>Latest Benchmarks</h2>
        <div id="benchContent">Loading…</div>
        <div id="benchError" class="error"></div>
    </div>
</div>

<script>
    async function loadBenchmarks() {
        const content = document.getElementById('benchContent');
        const errorEl = document.getElementById('benchError');

        try {
            const resp = await fetch('bench-data/latest.json');
            if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
            const json = await resp.json();

            const scenarios = json.scenarios || {};
            const legacy = json.legacy || {};

            let html = '';
            if (Object.keys(scenarios).length > 0) {
                for (const [scenario, backends] of Object.entries(scenarios)) {
                    html += `<h3>${scenario}</h3><table><thead><tr><th>Backend</th><th>Time</th></tr></thead><tbody>`;
                    for (const [backend, timeNs] of Object.entries(backends)) {
                        const timeMs = timeNs / 1e6;
                        const display = timeMs >= 1000
                            ? (timeMs / 1000).toFixed(2) + ' s'
                            : timeMs.toFixed(2) + ' ms';
                        html += `<tr><td>${backend}</td><td class="time">${display}</td></tr>`;
                    }
                    html += '</tbody></table>';
                }
            } else if (Object.keys(legacy).length > 0) {
                html += '<table><thead><tr><th>Benchmark</th><th>Time</th></tr></thead><tbody>';
                for (const [name, entry] of Object.entries(legacy)) {
                    const timeMs = (entry.time_ns / 1e6).toFixed(2) + ' ms';
                    html += `<tr><td>${name}</td><td class="time">${timeMs}</td></tr>`;
                }
                html += '</tbody></table>';
            } else {
                html = 'Benchmark data not available yet.';
            }

            content.innerHTML = html;
            errorEl.textContent = '';
        } catch (e) {
            content.innerHTML = 'Benchmark data could not be loaded.';
            errorEl.textContent = e.message;
        }
    }
    window.addEventListener('DOMContentLoaded', loadBenchmarks);
</script>
</body>
</html>
