<script>
    function formatTime(ns) {
        if (ns < 1000) {
            return ns.toFixed(2) + ' ns';
        }

        if (ns < 1_000_000) {
            return (ns / 1_000).toFixed(2) + ' µs';
        }

        if (ns < 1_000_000_000) {
            return (ns / 1_000_000).toFixed(2) + ' ms';
        }

        return (ns / 1_000_000_000).toFixed(2) + ' s';
    }

    async function loadData() {
        try {
            const resp = await fetch('bench-data/latest.json');

            if (!resp.ok) {
                throw new Error('Network error');
            }

            const json = await resp.json();

            buildUI(json);

        } catch (e) {
            document.getElementById('content').innerHTML =
                `<div class="error">Failed to load data: ${e.message}</div>`;
        }
    }

    function buildUI(data) {
        const crates = data.crates || {};
        const meta = data.metadata || {};

        document.getElementById('meta').innerHTML =
            `<span>Generated: ${meta.date || '?'}</span>
         <span>Commit: ${(meta.commit || '?').slice(0, 7)}</span>
         <span>Version: ${meta.version || '?'}</span>`;

        const nav = document.getElementById('tabNav');
        const content = document.getElementById('content');

        const crateNames = Object.keys(crates);

        if (crateNames.length === 0) {
            content.innerHTML = '<div class="loader">No benchmark data available.</div>';
            return;
        }

        nav.innerHTML = '';

        crateNames.forEach((crate, idx) => {
            const a = document.createElement('a');

            a.href = `#${crate}`;
            a.textContent = crate;

            if (idx === 0) {
                a.classList.add('active');
            }

            a.addEventListener('click', e => {
                e.preventDefault();

                document.querySelectorAll('#tabNav a')
                    .forEach(el => el.classList.remove('active'));

                a.classList.add('active');

                renderCrate(crate, crates[crate]);
            });

            nav.appendChild(a);
        });

        renderCrate(crateNames[0], crates[crateNames[0]]);
    }

    function renderCrate(crateName, scenarios) {
        const content = document.getElementById('content');

        let html =
            `<div class="crate-section">
            <div class="crate-title">${crateName}</div>`;

        for (const [scenarioName, backends] of Object.entries(scenarios)) {
            const times = Object.values(backends);
            const maxTime = Math.max(...times);

            html += `
            <div class="scenario-block">
                <div class="scenario-title">${scenarioName}</div>

                <table>
                    <thead>
                        <tr>
                            <th>Backend</th>
                            <th>Time</th>
                            <th>Relative</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

            for (const [backend, timeNs] of Object.entries(backends)) {
                const pct = Math.max(
                    Math.round((timeNs / maxTime) * 100),
                    1
                );

                html += `
                <tr>
                    <td>${backend}</td>
                    <td class="time">${formatTime(timeNs)}</td>
                    <td class="bar-cell">
                        <div class="bar" style="width:${pct}%"></div>
                    </td>
                </tr>
            `;
            }

            html += `
                    </tbody>
                </table>
            </div>
        `;
        }

        html += '</div>';

        content.innerHTML = html;
    }

    window.addEventListener('DOMContentLoaded', loadData);
</script>
