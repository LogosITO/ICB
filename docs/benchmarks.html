<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICB – Benchmarks</title>
    <style>
        :root {
            --bg: #111; --surface: #1a1a1a; --text: #ccc; --accent: #b0b0b0;
            --border: #333; --hover: #222; --header: #888;
            --mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            --radius: 6px;
            --red: #c44; --green: #4c4; --yellow: #cc4;
        }
        body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); }
        header { padding: 2rem; border-bottom: 1px solid var(--border); text-align: center; }
        h1 { font-size: 2rem; color: var(--accent); }
        .container { max-width: 1200px; margin: 0 auto; padding: 1rem 2rem; }
        .card {
            background: var(--surface); border: 1px solid var(--border);
            padding: 1.5rem; margin: 1.5rem 0; border-radius: var(--radius);
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        .card h2 { margin-top: 0; color: var(--accent); }
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        th, td { padding: 0.6rem 0.8rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        th { color: var(--header); font-weight: 500; text-align: left; background: rgba(255,255,255,0.03); cursor: pointer; user-select: none; }
        th:hover { color: var(--accent); }
        tbody tr:hover { background: var(--hover); }
        .time { font-family: var(--mono); text-align: right; white-space: nowrap; width: 130px; color: var(--accent); }
        .bar-cell { width: 100px; }
        .bar { background: var(--accent); height: 12px; border-radius: 6px; min-width: 4px; }
        .error { color: var(--red); font-size: 0.9rem; margin-top: 0.5rem; }
        #meta { font-size: 0.85rem; color: var(--header); margin-bottom: 1rem; display: flex; flex-wrap: wrap; gap: 1.5rem; }
        .tab-nav { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .tab-nav a {
            padding: 0.5rem 1.2rem; background: transparent; color: var(--text); text-decoration: none;
            border: 1px solid transparent; border-bottom: none; border-radius: var(--radius) var(--radius) 0 0;
            font-size: 0.9rem; transition: background 0.2s;
        }
        .tab-nav a.active { background: var(--surface); border-color: var(--border); color: var(--accent); }
        .tab-nav a:hover:not(.active) { background: var(--hover); }
        .crate-title { font-size: 1.2rem; color: var(--accent); margin-bottom: 0.5rem; }
        .scenario-title { font-size: 1rem; color: var(--header); margin: 1.5rem 0 0.5rem; }
        .loader { color: var(--header); font-style: italic; }
        a { color: var(--accent); }
        a:hover { color: white; }
        .delta { font-size: 0.8rem; margin-left: 0.5rem; }
        .delta.pos { color: var(--red); }
        .delta.neg { color: var(--green); }
        .delta.zero { color: var(--header); }
        .search-box { margin-bottom: 1rem; }
        .search-box input {
            background: var(--surface); border: 1px solid var(--border); color: var(--text);
            padding: 0.5rem 1rem; border-radius: var(--radius); width: 100%; max-width: 300px;
            font-size: 0.9rem;
        }
        .filter-backends { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
        .filter-backends label { display: flex; align-items: center; gap: 0.3rem; font-size: 0.85rem; cursor: pointer; }
        .filter-backends input[type="checkbox"] { accent-color: var(--accent); }
    </style>
</head>
<body>
<header>
    <h1>ICB – Benchmarks</h1>
    <p>Performance measurements across all backends</p>
    <a href="index.html" style="font-size:0.9rem;">← Back to project page</a>
</header>
<div class="container">
    <div class="card">
        <div id="meta"></div>
        <div class="search-box"><input type="text" id="searchInput" placeholder="Search scenario..." oninput="applyFilters()"></div>
        <div class="filter-backends" id="backendFilters"></div>
        <div class="tab-nav" id="tabNav"></div>
        <div id="content"><div class="loader">Loading benchmark data…</div></div>
    </div>
</div>

<script>
    let currentData = null;
    let baselineData = null;
    let activeCrate = null;

    function formatTime(ns) {
        if (ns < 1000) return ns.toFixed(2) + ' ns';
        if (ns < 1_000_000) return (ns / 1_000).toFixed(2) + ' µs';
        if (ns < 1_000_000_000) return (ns / 1_000_000).toFixed(2) + ' ms';
        return (ns / 1_000_000_000).toFixed(2) + ' s';
    }

    async function loadData() {
        try {
            const [latestResp, baselineResp] = await Promise.all([
                fetch('bench-data/latest.json'),
                fetch('bench-data/baseline.json').catch(() => null)
            ]);
            if (!latestResp.ok) throw new Error('Network error');
            currentData = await latestResp.json();
            if (baselineResp && baselineResp.ok) baselineData = await baselineResp.json();
            buildUI();
        } catch (e) {
            document.getElementById('content').innerHTML = `<div class="error">Failed to load data: ${e.message}</div>`;
        }
    }

    function buildUI() {
        const crates = currentData.crates || {};
        const meta = currentData.metadata || {};
        document.getElementById('meta').innerHTML =
            `<span>Generated: ${meta.date || '?'}</span>
             <span>Commit: ${(meta.commit || '?').slice(0, 7)}</span>
             ${baselineData && Object.keys(baselineData.crates || {}).length > 0 ? '<span>Baseline available</span>' : '<span>No baseline yet</span>'}`;

        const nav = document.getElementById('tabNav');
        const crateNames = Object.keys(crates);
        if (crateNames.length === 0) {
            document.getElementById('content').innerHTML = '<div class="loader">No benchmark data available.</div>';
            return;
        }
        nav.innerHTML = '';
        crateNames.forEach((crate, idx) => {
            const a = document.createElement('a');
            a.href = `#${crate}`;
            a.textContent = crate;
            if (idx === 0) a.classList.add('active');
            a.addEventListener('click', e => {
                e.preventDefault();
                document.querySelectorAll('#tabNav a').forEach(el => el.classList.remove('active'));
                a.classList.add('active');
                activeCrate = crate;
                applyFilters();
            });
            nav.appendChild(a);
        });
        activeCrate = crateNames[0];
        populateBackendFilters(crates);
        applyFilters();
    }

    function collectAllBackends(allCrates) {
        const backends = new Set();
        for (const crate of Object.values(allCrates)) {
            for (const scenario of Object.values(crate)) {
                for (const backend of Object.keys(scenario)) {
                    backends.add(backend);
                }
            }
        }
        return Array.from(backends).sort();
    }

    function populateBackendFilters(allCrates) {
        const allBackends = collectAllBackends(allCrates);
        const container = document.getElementById('backendFilters');
        container.innerHTML = '';
        allBackends.forEach(b => {
            const label = document.createElement('label');
            label.innerHTML = `<input type="checkbox" value="${b}" checked onchange="applyFilters()"> ${b}`;
            container.appendChild(label);
        });
    }

    function applyFilters() {
        if (!activeCrate) return;
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const checkedBackends = new Set(
            [...document.querySelectorAll('#backendFilters input:checked')].map(cb => cb.value)
        );
        const scenarios = currentData.crates[activeCrate];
        renderCrate(activeCrate, scenarios, searchTerm, checkedBackends);
    }

    function getBaselineValue(crate, scenario, backend) {
        if (!baselineData || !baselineData.crates) return null;
        const crateData = baselineData.crates[crate];
        if (!crateData) return null;
        const scenarioData = crateData[scenario];
        if (!scenarioData) return null;
        return scenarioData[backend] || null;
    }

    function renderCrate(crateName, scenarios, searchTerm, visibleBackends) {
        const content = document.getElementById('content');
        let html = `<div class="crate-section"><div class="crate-title">${crateName}</div>`;
        let visible = false;

        for (const [scenarioName, backends] of Object.entries(scenarios)) {
            if (searchTerm && !scenarioName.toLowerCase().includes(searchTerm)) continue;
            const filteredBackends = {};
            for (const [backend, timeNs] of Object.entries(backends)) {
                if (visibleBackends.has(backend)) filteredBackends[backend] = timeNs;
            }
            if (Object.keys(filteredBackends).length === 0) continue;
            visible = true;
            const times = Object.values(filteredBackends);
            const maxTime = Math.max(...times);
            html += `<div class="scenario-block"><div class="scenario-title">${scenarioName}</div>`;
            html += `<table><thead><tr><th>Backend</th><th>Time</th><th>vs Baseline</th><th>Relative</th></tr></thead><tbody>`;
            for (const [backend, timeNs] of Object.entries(filteredBackends)) {
                const pct = maxTime > 0 ? Math.max(Math.round((timeNs / maxTime) * 100), 1) : 100;
                let deltaHtml = '';
                const base = getBaselineValue(crateName, scenarioName, backend);
                if (base !== null && base > 0) {
                    const delta = ((timeNs - base) / base * 100);
                    const cls = delta > 10 ? 'pos' : (delta < -10 ? 'neg' : 'zero');
                    const sign = delta > 0 ? '+' : '';
                    deltaHtml = `<span class="delta ${cls}">${sign}${delta.toFixed(1)}%</span>`;
                } else {
                    deltaHtml = '<span class="delta zero">-</span>';
                }
                html += `<tr>
                    <td>${backend}</td>
                    <td class="time">${formatTime(timeNs)}</td>
                    <td>${deltaHtml}</td>
                    <td class="bar-cell"><div class="bar" style="width:${pct}%"></div></td>
                </tr>`;
            }
            html += `</tbody></table></div>`;
        }
        if (!visible) html += '<p>No matching scenarios with selected backends.</p>';
        html += `</div>`;
        content.innerHTML = html;

        // add sorting to tables
        document.querySelectorAll('table').forEach(table => {
            const headers = table.querySelectorAll('th');
            headers.forEach((th, colIdx) => {
                th.addEventListener('click', () => sortTable(table, colIdx));
            });
        });
    }

    function sortTable(table, colIdx) {
        const tbody = table.querySelector('tbody');
        const rows = Array.from(tbody.querySelectorAll('tr'));
        const isAsc = table.dataset.sortCol == colIdx ? table.dataset.sortDir !== 'asc' : true;
        table.dataset.sortCol = colIdx;
        table.dataset.sortDir = isAsc ? 'asc' : 'desc';
        rows.sort((a, b) => {
            let aVal = a.cells[colIdx].textContent.trim();
            let bVal = b.cells[colIdx].textContent.trim();
            const aNum = parseFloat(aVal.replace(/[^0-9.-]/g, ''));
            const bNum = parseFloat(bVal.replace(/[^0-9.-]/g, ''));
            if (!isNaN(aNum) && !isNaN(bNum)) {
                return isAsc ? aNum - bNum : bNum - aNum;
            }
            return isAsc ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
        });
        rows.forEach(row => tbody.appendChild(row));
    }

    window.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
