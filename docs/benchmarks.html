<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICB Benchmarks</title>
    <style>
        :root {
            --bg: #111; --surface: #1a1a1a; --text: #ccc; --accent: #b0b0b0;
            --border: #333; --hover: #222; --header: #888;
        }
        body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); }
        header { padding: 1.5rem; border-bottom: 1px solid var(--border); }
        h1 { margin: 0; font-size: 1.5rem; color: var(--accent); }
        nav { display: flex; gap: 1px; margin: 1rem 0; flex-wrap: wrap; }
        nav a { padding: 0.5rem 1rem; text-decoration: none; color: var(--text); background: var(--surface); border-bottom: 2px solid transparent; transition: .2s; }
        nav a.active, nav a:hover { border-bottom-color: var(--accent); color: white; }
        .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        th, td { padding: 0.6rem 0.8rem; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        th { color: var(--header); font-weight: 500; }
        tr:hover { background: var(--hover); }
        .loader { text-align: center; padding: 3rem; color: var(--header); }
        .error { color: #c44; }
        .metric { font-weight: 600; }
        .bar { height: 8px; background: var(--accent); border-radius: 4px; min-width: 4px; }
        .meta { font-size: 0.8rem; color: var(--header); margin-bottom: 1rem; }
    </style>
</head>
<body>
<header>
    <h1>ICB Benchmarks</h1>
    <nav id="tabNav"></nav>
</header>
<div class="container">
    <div id="meta" class="meta"></div>
    <div id="content" class="loader">Loading benchmark data…</div>
</div>

<script>
    async function loadData() {
        try {
            const resp = await fetch('bench-data/latest.json');
            if (!resp.ok) throw new Error('Network error');
            const json = await resp.json();
            window.__data = json;
            buildUI(json);
        } catch (e) {
            document.getElementById('content').innerHTML = `<div class="error">Failed to load data: ${e.message}</div>`;
        }
    }

    function buildUI(data) {
        const scenarios = data.scenarios || {};
        const meta = data.metadata || {};
        document.getElementById('meta').textContent =
            `Generated: ${meta.date || '?'}  Commit: ${meta.commit.slice(0, 7) || '?'}  Version: ${meta.version || '?'}`;

        const nav = document.getElementById('tabNav');
        const content = document.getElementById('content');
        const tabs = Object.keys(scenarios);

        if (tabs.length === 0) {
            content.innerHTML = '<div class="loader">No benchmark scenarios found.</div>';
            return;
        }

        tabs.forEach((tab, idx) => {
            const a = document.createElement('a');
            a.href = `#${tab}`;
            a.textContent = tab;
            if (idx === 0) a.classList.add('active');
            a.addEventListener('click', e => {
                e.preventDefault();
                document.querySelectorAll('#tabNav a').forEach(el => el.classList.remove('active'));
                a.classList.add('active');
                renderScenario(tab, scenarios[tab]);
            });
            nav.appendChild(a);
        });

        renderScenario(tabs[0], scenarios[tabs[0]]);
    }

    function renderScenario(name, backends) {
        const content = document.getElementById('content');
        const maxTime = Math.max(...Object.values(backends));
        let html = `<h2>${name}</h2><table><thead><tr><th>Backend</th><th>Time</th><th>Bar</th></tr></thead><tbody>`;
        for (const [backend, timeNs] of Object.entries(backends)) {
            const timeMs = (timeNs / 1e6).toFixed(2);
            const pct = Math.round((timeNs / maxTime) * 100);
            html += `<tr>
                <td>${backend}</td>
                <td class="metric">${timeMs} ms</td>
                <td><div class="bar" style="width:${Math.max(pct, 1)}%"></div></td>
            </tr>`;
        }
        html += '</tbody></table>';
        content.innerHTML = html;
    }

    window.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
